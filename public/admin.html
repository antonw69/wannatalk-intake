<!DOCTYPE html>
<html>
<head>
  <title>WannaTalk Admin</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --black: #050807;
      --dark: #0b1411;
      --green: #18c964;
      --green-soft: #dffbea;
      --text: #eaf7ef;
      --muted: #9fb8aa;
      --border: #1f3a2d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;

      background:
        radial-gradient(circle at top left, rgba(24,201,100,0.18), transparent 35%),
        linear-gradient(135deg, var(--black), var(--dark));

      min-height: 100vh;
      padding: 16px;
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: rgba(16, 28, 23, 0.96);
      border-radius: 24px;
      padding: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      margin-bottom: 18px;
    }

    h1 {
      margin-top: 0;
      color: var(--green);
      font-size: 28px;
    }

    h2 {
      color: var(--green-soft);
      margin-bottom: 8px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(5,8,7,0.75);
      color: var(--text);
      margin-top: 6px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: var(--green);
      color: #031007;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .submission {
      background: rgba(5,8,7,0.45);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-top: 18px;
    }

    audio {
      width: 100%;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      font-size: 13px;
      max-height: 300px;
    }

    .hidden {
      display: none;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filename {
      color: var(--green-soft);
      font-size: 13px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .login-status {
      margin-top: 10px;
      color: #ff9b9b;
      font-size: 13px;
    }

    .analysis-box {
      margin-top: 12px;
    }

    .back-link {
      display: inline-block;
      margin-top: 14px;
      color: var(--green);
      text-decoration: none;
      font-size: 13px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .small-btn {
      font-size: 12px;
      padding: 10px 14px;
      margin-top: 10px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->

  <div class="card" id="loginCard">

    <h1>WannaTalk Admin</h1>

    <p class="muted">
      Login to access voice recordings, transcripts and analysis.
    </p>

    <label>Username</label>
    <input type="text" id="username" placeholder="admin">

    <label>Password</label>
    <input type="password" id="password" placeholder="1234">

    <button onclick="login()">Login</button>

    <div class="login-status" id="loginStatus"></div>

    <a href="/" class="back-link">← Back to Intake</a>

  </div>

  <!-- ADMIN PANEL -->

  <div class="card hidden" id="adminCard">

    <div class="top-row">
      <div>
        <h1>WannaTalk Admin</h1>
        <p class="muted">
          Stage 1 Review Console
        </p>
      </div>

      <div>
        <button onclick="loadSubmissions()">Refresh</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="submissions"></div>

  </div>

</div>

<script>

let authHeader = "";

function login() {

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  authHeader = "Basic " + btoa(username + ":" + password);

  fetch("/api/admin/submissions", {
    headers: {
      "Authorization": authHeader
    }
  })
  .then(async res => {

    if (!res.ok) {
      throw new Error("Invalid login");
    }

    return res.json();

  })
  .then(data => {

    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("adminCard").classList.remove("hidden");

    renderSubmissions(data.submissions);

  })
  .catch(err => {

    console.error(err);

    document.getElementById("loginStatus").innerText =
      "Invalid username or password.";

  });
}

function logout() {

  authHeader = "";

  document.getElementById("adminCard").classList.add("hidden");
  document.getElementById("loginCard").classList.remove("hidden");

  document.getElementById("submissions").innerHTML = "";
}

function loadSubmissions() {

  fetch("/api/admin/submissions", {
    headers: {
      "Authorization": authHeader
    }
  })
  .then(res => res.json())
  .then(data => renderSubmissions(data.submissions))
  .catch(err => console.error(err));
}

function renderSubmissions(submissions) {

  const container = document.getElementById("submissions");

  container.innerHTML = "";

  if (!submissions || submissions.length === 0) {

    container.innerHTML = `
      <p class="muted">No submissions found.</p>
    `;

    return;
  }

  submissions.forEach(item => {

    const div = document.createElement("div");

    div.className = "submission";

    div.innerHTML = `
      <div class="filename">
        <strong>${item.audioFile}</strong>
      </div>

      <audio controls
        src="/api/admin/audio/${encodeURIComponent(item.audioFile)}">
      </audio>

      <div>
        <button class="small-btn"
          onclick="loadTranscript('${item.transcriptFile}', this)">
          Load Transcript
        </button>

        <button class="small-btn"
          onclick="loadAnalysis('${item.analysisFile}', this)">
          Load Analysis
        </button>
      </div>

      <div class="analysis-box">
        <pre class="transcript">
Transcript not loaded yet.
        </pre>
      </div>

      <div class="analysis-box">
        <pre class="analysis">
Analysis not loaded yet.
        </pre>
      </div>
    `;

    container.appendChild(div);
  });
}

function loadTranscript(filename, button) {

  fetch("/api/admin/transcript/" + encodeURIComponent(filename), {
    headers: {
      "Authorization": authHeader
    }
  })
  .then(res => res.text())
  .then(text => {

    const pre = button
      .closest(".submission")
      .querySelector(".transcript");

    pre.innerText = text;
  })
  .catch(err => console.error(err));
}

function loadAnalysis(filename, button) {

  fetch("/api/admin/analysis/" + encodeURIComponent(filename), {
    headers: {
      "Authorization": authHeader
    }
  })
  .then(res => res.text())
  .then(text => {

    const pre = button
      .closest(".submission")
      .querySelector(".analysis");

    pre.innerText = text;
  })
  .catch(err => console.error(err));
}

</script>

</body>
</html>
