<!DOCTYPE html>
<html>
<head>
    <title>WannaTalk Intake Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #050807;
            color: #eaf7ef;
            padding: 20px;
        }

        h1 {
            color: #18c964;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            color: #dffbea;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .metric, .card {
            background: #101c17;
            border: 1px solid #1f3a2d;
            border-radius: 16px;
            padding: 16px;
        }

            .metric strong {
                display: block;
                font-size: 28px;
                color: #18c964;
                margin-top: 6px;
            }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border-bottom: 1px solid #1f3a2d;
            padding: 10px;
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }

        th {
            color: #18c964;
        }

        .risk-low {
            color: #18c964;
            font-weight: bold;
        }

        .risk-medium {
            color: #ffd166;
            font-weight: bold;
        }

        .risk-high {
            color: #ff9f43;
            font-weight: bold;
        }

        .risk-urgent {
            color: #ff5c5c;
            font-weight: bold;
        }

        .risk-unknown {
            color: #9fb8aa;
            font-weight: bold;
        }

        button {
            background: #18c964;
            border: none;
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            margin: 3px;
        }

        pre {
            white-space: pre-wrap;
            background: #050807;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #1f3a2d;
            max-height: 360px;
            overflow: auto;
        }

        audio {
            width: 100%;
            margin: 10px 0 16px;
        }

        .small {
            color: #9fb8aa;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>WannaTalk Intake Dashboard</h1>

    <div class="grid">

        <div class="metric">Total <strong id="total">0</strong></div>

        <div class="metric">Voice <strong id="voice">0</strong></div>

        <div class="metric">Text <strong id="text">0</strong></div>

    </div>

    <div class="grid">

        <div class="metric">Low <strong id="low">0</strong></div>

        <div class="metric">Medium <strong id="medium">0</strong></div>

        <div class="metric">High <strong id="high">0</strong></div>

        <div class="metric">Urgent <strong id="urgent">0</strong></div>

    </div>

    <div class="card">

        <h2>Latest Intakes</h2>

        <div class="small">Showing latest intake records from PostgreSQL.</div>

        <table>

            <thead>

                <tr>

                    <th>Date</th>

                    <th>Name</th>

                    <th>Contact</th>

                    <th>Type</th>

                    <th>Risk</th>

                    <th>Category</th>

                    <th>Support</th>

                    <th>Status</th>

                    <th>Summary</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="rows"></tbody>

        </table>

    </div>

    <div class="card">

        <h2>Viewer</h2>

        <div id="audioBox"></div>

        <pre id="viewer">Select transcript or analysis...</pre>

    </div>

    <script>async function loadDashboard() {

            const res = await fetch("/api/pilot-dashboard");

            const data = await res.json();

            if (!data.success) {

                document.getElementById("viewer").innerText = "Could not load dashboard.";

                return;

            }

            const intakes = data.intakes || [];

            document.getElementById("total").innerText = intakes.length;

            document.getElementById("voice").innerText = intakes.filter(x => x.intake_type === "voice").length;

            document.getElementById("text").innerText = intakes.filter(x => x.intake_type === "text").length;

            document.getElementById("low").innerText = intakes.filter(x => x.risk_level === "low").length;

            document.getElementById("medium").innerText = intakes.filter(x => x.risk_level === "medium").length;

            document.getElementById("high").innerText = intakes.filter(x => x.risk_level === "high").length;

            document.getElementById("urgent").innerText = intakes.filter(x => x.risk_level === "urgent").length;

            const rows = document.getElementById("rows");

            rows.innerHTML = "";

            intakes.forEach(item => {

                const audioFile = item.audio_file ? item.audio_file.split("/").pop() : "";

                const transcriptFile = item.transcript_file ? item.transcript_file.split("/").pop() : "";

                const analysisFile = item.analysis_file ? item.analysis_file.split("/").pop() : "";

                const risk = item.risk_level || "unknown";

                const riskClass = "risk-" + risk;

                rows.innerHTML += `

                        <tr>

                            <td>${item.created_at ? new Date(item.created_at).toLocaleString() : ""}</td>

                            <td>${item.full_name || ""}</td>

                            <td>${item.contact_number || ""}</td>

                            <td>${item.intake_type || ""}</td>

                            <td class="${riskClass}">${risk}</td>

                            <td>${item.primary_category || "unknown"}</td>

                            <td>${item.preferred_support || "unknown"}</td>

                            <td>${item.summary || ""}</td>

                            <td>

                                ${audioFile ? `<button onclick="playAudio('${audioFile}')">Play</button>` : ""}

                                ${transcriptFile ? `<button onclick="loadText('/api/admin/transcript/${transcriptFile}')">Transcript</button>` : ""}

                                ${analysisFile ? `<button onclick="loadText('/api/admin/analysis/${analysisFile}')">Analysis</button>` : ""}

                            </td>

                        </tr>

                    `;

            });

        }

        function playAudio(file) {

            document.getElementById("audioBox").innerHTML =

                `<audio controls src="/api/pilot-audio/${file}"></audio>`;

        }

        async function loadText(url) {

            const res = await fetch(url);

            const text = await res.text();

            document.getElementById("viewer").innerText = text;

        }

        loadDashboard();</script>

</body>

</html>
